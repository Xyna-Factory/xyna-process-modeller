<div class="coding-editor-container">

    <!-- Java -->
    @if(!isPython) {
    <ngx-monaco-editor [(ngModel)]="javaCode" [options]="javaOptions"
        (onInit)="onJavaInit($event)">
    </ngx-monaco-editor>
    }

    <!-- Python -->
    @if(isPython) {
    <ngx-monaco-editor [(ngModel)]="pythonCode" [options]="pythonOptions"
        (onInit)="onPythonInit($event)">
    </ngx-monaco-editor>
    }

</div>
