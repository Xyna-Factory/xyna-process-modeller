<ngx-monaco-editor
    class = "editor"
    [ngClass] = "{'editor-hide' : isPython}"
    [options]="javaEditorOptions"
    [ngModel]="javaCode"
    (ngModelChange)="javaCode = $event"
    (onInit)="monacoInitJava($event)"
></ngx-monaco-editor>
<ngx-monaco-editor
    class = "editor"
    [ngClass] = "{'editor-hide' : !isPython}"
    [options]="pythonEditorOptions"
    [ngModel]="pythonCode"
    (ngModelChange)="pythonCode = $event"
    (onInit)="monacoInitPython($event)"
></ngx-monaco-editor>
